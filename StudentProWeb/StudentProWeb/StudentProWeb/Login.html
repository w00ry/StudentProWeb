<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Pro - Giriş Yap</title>
    <style>
        /* Mavi - Beyaz OBS Teması */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* Açık mavi/gri arkaplan */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #0056b3; /* Kurumsal mavi vurgu */
        }

            .auth-container h2 {
                text-align: center;
                color: #0056b3;
                margin-bottom: 25px;
            }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                color: #333;
                font-weight: 500;
            }

            .form-group input {
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 5px;
                box-sizing: border-box;
                font-size: 1rem;
            }

                .form-group input:focus {
                    border-color: #0056b3;
                    outline: none;
                    box-shadow: 0 0 5px rgba(0, 86, 179, 0.3);
                }

        /* Şifre Göster/Gizle İkonu İçin Konumlandırma */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 40px;
            cursor: pointer;
            color: #666;
            user-select: none;
        }

        button.btn-primary {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

            button.btn-primary:hover {
                background-color: #004494;
            }

        .toggle-form {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

            .toggle-form a {
                color: #0056b3;
                text-decoration: none;
                font-weight: 600;
            }
        /* MOBİL UYUM (RESPONSIVE) SİHRİ */
        @@@media (max-width: 768px) {
            body {
                flex-direction: column; /* Sol menüyü ve içeriği alt alta al */
            }

            aside {
                width: 100%; /* Menü tüm ekranı kaplasın */
                padding: 10px 0;
            }

                aside h1 {
                    margin-bottom: 15px;
                }

                aside nav ul {
                    display: flex;
                    flex-wrap: wrap; /* Menü linklerini yatay diz, sığmazsa alta at */
                    justify-content: center;
                    gap: 5px;
                    padding: 0 10px;
                }

                    aside nav ul li {
                        flex: 1 1 auto;
                        text-align: center;
                    }

                        aside nav ul li a {
                            padding: 8px 12px;
                            font-size: 0.85rem;
                            border-radius: 4px;
                            border-left: none !important; /* Mobilde sol çizgi kötü durur */
                            border-bottom: 3px solid transparent;
                        }

                            aside nav ul li a:hover, aside nav ul li a.active {
                                background-color: var(--secondary-color);
                                border-bottom: 3px solid var(--accent-color);
                            }

            main {
                padding: 15px; /* Mobilde kenar boşluklarını daralt */
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .header-flex {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .btn-add {
                width: 100%; /* Butonlar mobilde tam genişlik olsun */
                text-align: center;
                box-sizing: border-box;
            }

            .form-row {
                flex-direction: column; /* Yan yana form kutularını alt alta al */
                gap: 15px;
            }

            .card {
                padding: 15px;
                overflow-x: auto; /* Tablolar taşarsa sağa kaydırma çubuğu çıkar */
            }

            table {
                min-width: 500px; /* Tablo çok ezilmesin, kaydırılabilsin */
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Student Pro Sistem Girişi</h2>

        <form id="authForm">
            <div class="form-group">
                <label for="email">E-posta Adresi (.edu uzantılı)</label>
                <input type="email" id="email" placeholder="ornek@edu.tr" required>
            </div>

            <div class="form-group">
                <label for="password">Şifre (Maksimum 12 Karakter)</label>
                <input type="password" id="password" maxlength="12" placeholder="Şifrenizi girin" required>
                <span class="password-toggle" onclick="togglePassword()">👁️</span>
            </div>

            <button type="button" class="btn-primary" onclick="submitForm()">Giriş Yap</button>
        </form>

        <div class="toggle-form">
            Hesabınız yok mu? <a href="#">Kayıt Ol</a>
        </div>
    </div>

    <script>
        // Şifre Göster/Gizle (Göz İkonu) Mantığı
        function togglePassword() {
            var passwordInput = document.getElementById("password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }

        // İleride C# tarafına bağlayacağımız buton fonksiyonu
        function submitForm() {
            alert("C# Backend'e bağlanacak. E-posta ve şifre kontrol ediliyor...");
        }
    </script>
</body>
</html>
